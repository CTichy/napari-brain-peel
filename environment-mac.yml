name: skin-seg
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  - pip:
    # ── PyTorch (CPU / Apple MPS) ────────────────────────────────────────
    - torch
    - torchvision

    # ── Core scientific stack ────────────────────────────────────────────
    - numpy>=1.20
    - scipy
    - scikit-image
    - scikit-learn
    - tifffile
    - imagecodecs
    - skan

    # ── MONAI ────────────────────────────────────────────────────────────
    - monai>=1.0

    # ── Napari + plugins ─────────────────────────────────────────────────
    - "napari[all]>=0.5"
    - napari-console
    - napari-svg
    - napari-label-focus
    - napari-3d-ortho-viewer
    - napari-segment-blobs-and-things-with-membranes
    - napari-assistant
    - napari-time-slicer
    - napari-tools-menu
    - napari-workflows

    # ── IMS file reader ──────────────────────────────────────────────────
    - imaris-ims-file-reader

    # ── Description backends (Tab 3) ─────────────────────────────────────
    - openai
    - anthropic
    - requests

    # ── Plugin ───────────────────────────────────────────────────────────
    - "napari-skin-remover @ git+https://github.com/CTichy/napari-skin-remover.git"

name: napari-brain-peel
display_name: MONAI Brain Peel
contributions:
  commands:
    - id: napari-brain-peel.brain_peel_widget
      python_name: napari_brain_peel._widget:BrainPeelWidget
      title: MONAI Brain Peel
    - id: napari-brain-peel.get_reader
      python_name: napari_brain_peel._reader:get_reader
      title: Open confocal stack (TIF / IMS)
  widgets:
    - command: napari-brain-peel.brain_peel_widget
      display_name: MONAI Brain Peel
  readers:
    - command: napari-brain-peel.get_reader
      filename_patterns:
        - "*.tif"
        - "*.tiff"
        - "*.ims"
      accepts_directories: false
